<html lang="en">
<head>

  <title>Plink Cat</title>

    html, body {

      height: 100%;
    }

    .background {
      width: 100vw;
      height: 100vh;

    .awkward-img {

    }
  </style>
</head>
<body>
  <img class="background" src="https://media1.tenor.com/m/y1QFa-1vyKYAAAAd/plink-wide-cat.gif" alt="Plink Cat">

  <!-- awkward floating placeholder image -->
  <img class="awkward-img" src="qr.svg" alt="Placeholder">

</html>
